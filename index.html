<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WarInfo Mobile</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script>
        // Simple data loading
        fetch('conflict_data.json')
            .then(response => response.json())
            .then(data => {
                const map = L.map('map').setView([20, 0], 2);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                
                // Add heatmap
                const heatPoints = [];
                const coords = {
                    "Ukraine": [48.3794, 31.1656],
                    "Israel": [31.0461, 34.8516],
                    "Gaza": [31.3547, 34.3051],
                    "Sudan": [12.8628, 30.2176],
                    "Myanmar": [21.9162, 95.9560],
                    "Syria": [34.8021, 38.9968],
                    "Yemen": [15.5527, 48.5164],
                    "Afghanistan": [33.9391, 67.7100],
                    "Somalia": [5.1521, 46.1996],
                    "Nigeria": [9.0820, 8.6753],
                    "Colombia": [4.5709, -74.2973],
                    "Mexico": [23.6345, -102.5528],
                    "Haiti": [18.9712, -72.2852],
                    "Pakistan": [30.3753, 69.3451],
                    "India": [20.5937, 78.9629],
                    "Philippines": [12.8797, 121.7740],
                    "Russia": [61.5240, 105.3188],
                    "Turkey": [38.9637, 35.2433]
                };
                
                Object.entries(data.conflict_data).forEach(([country, info]) => {
                    if (coords[country]) {
                        const weight = Math.min(info.intensity / 100, 1);
                        heatPoints.push([...coords[country], weight]);
                    }
                });
                
                if (heatPoints.length > 0) {
                    L.heatLayer(heatPoints, {
                        radius: 25,
                        blur: 15,
                        gradient: {0.4: '#00ff00', 0.6: '#ffff00', 0.8: '#ff8000', 1.0: '#ff0000'}
                    }).addTo(map);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('map').innerHTML = '<div style="padding:20px;color:red;">Error loading data: ' + error.message + '</div>';
            });
    </script>
</body>
</html>
