<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ff6b6b">
    <title>WarInfo Step 1 - Map + Heatmap</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.css" />
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8f9fa; color: #333; line-height: 1.6; overflow-x: hidden; }
        .app-container { max-width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        .header { background: linear-gradient(135deg, #ff6b6b, #ee5a52); color: white; padding: 16px 20px; text-align: center; position: relative; z-index: 100; }
        .header h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 4px; }
        .map-container { flex: 1; min-height: 300px; background: #e9ecef; position: relative; overflow: hidden; }
        #map { width: 100%; height: 100%; min-height: 300px; }
        .loading { display: flex; justify-content: center; align-items: center; height: 100%; color: #666; }
        .error-message { padding: 20px; text-align: center; color: #dc3545; background: #f8d7da; border-radius: 8px; margin: 10px; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>WarInfo Step 1</h1>
            <p>Map + Heatmap Test</p>
        </div>
        
        <div class="map-container">
            <div id="map" class="loading">Loading map...</div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

    <script>
        let mapInstance = null;
        
        async function loadData() {
            try {
                const response = await fetch('conflict_data.json');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                initMap(data.conflict_data);
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('map').innerHTML = 
                    `<div class="error-message">Failed to load heatmap data: ${error.message}</div>`;
            }
        }
        
        function initMap(conflictData) {
            mapInstance = L.map('map', {
                zoomControl: true,
                attributionControl: false
            }).setView([20, 0], 2);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
                maxZoom: 12,
                detectRetina: true
            }).addTo(mapInstance);
            
            if (conflictData && Object.keys(conflictData).length > 0) {
                addHeatmapLayer(mapInstance, conflictData);
            }
            
            document.getElementById('map').innerHTML = '';
        }
        
        function addHeatmapLayer(map, conflictData) {
            const heatPoints = [];
            const countryCoordinates = {
                "Ukraine": [48.3794, 31.1656],
                "Israel": [31.0461, 34.8516],
                "Gaza": [31.3547, 34.3051],
                "Sudan": [12.8628, 30.2176],
                "Myanmar": [21.9162, 95.9560],
                "Syria": [34.8021, 38.9968],
                "Yemen": [15.5527, 48.5164],
                "Afghanistan": [33.9391, 67.7100],
                "Somalia": [5.1521, 46.1996],
                "Nigeria": [9.0820, 8.6753],
                "Colombia": [4.5709, -74.2973],
                "Mexico": [23.6345, -102.5528],
                "Haiti": [18.9712, -72.2852],
                "Pakistan": [30.3753, 69.3451],
                "India": [20.5937, 78.9629],
                "Philippines": [12.8797, 121.7740],
                "Russia": [61.5240, 105.3188],
                "Turkey": [38.9637, 35.2433]
            };
            
            Object.entries(conflictData).forEach(([country, data]) => {
                const coords = countryCoordinates[country];
                if (coords) {
                    const intensity = data.intensity || 0;
                    const weight = Math.min(intensity / 100, 1);
                    heatPoints.push([...coords, weight]);
                }
            });
            
            if (heatPoints.length > 0) {
                L.heatLayer(heatPoints, {
                    radius: 25,
                    blur: 15,
                    maxZoom: 12,
                    gradient: {
                        0.4: '#00ff00',
                        0.6: '#ffff00', 
                        0.8: '#ff8000',
                        1.0: '#ff0000'
                    }
                }).addTo(map);
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
        });
    </script>
</body>
</html>
