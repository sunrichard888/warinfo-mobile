<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TianDiTu Verify</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 400px; width: 100%; }
    </style>
</head>
<body>
    <h1>TianDiTu Verification</h1>
    <div id="map"></div>
    <div id="status">Loading...</div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        try {
            const map = L.map('map').setView([39.9, 116.4], 4);
            
            // 天地图矢量底图
            L.tileLayer('https://t0.tianditu.gov.cn/vec_c/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=vec&STYLE=default&TILEMATRIXSET=c&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}&FORMAT=tiles&tk=62db4081b94d31299652cdcbb89f7865', {
                attribution: '© 天地图',
                maxZoom: 18
            }).addTo(map);
            
            document.getElementById('status').innerHTML = 'TianDiTu loaded successfully!';
        } catch (error) {
            document.getElementById('status').innerHTML = 'Error: ' + error.message;
        }
    </script>
</body>
</html>
